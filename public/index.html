<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Stream your favorite anime online - Watch latest and ongoing anime series">
  <meta name="theme-color" content="#6366f1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AnimeStream">
  
  <title>AnimeStream - Watch Anime Online</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  
  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
  
  <link rel="stylesheet" href="/style/style.css">
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">AnimeStream</a>
      <button class="mobile-menu-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/anime-list/">Anime</a></li>
        <li><a href="/genre-list/">Genres</a></li>
        <li><a href="/ongoing-anime/">Ongoing</a></li>
        <li><a href="/schedule/">Schedule</a></li>
      </ul>
      <div class="search-container">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input type="text" class="search-input" placeholder="Search anime...">
        <div class="search-results"></div>
      </div>
    </div>
  </nav>

  <div class="container">
    <section class="hero-modern" id="hero">
      <div class="hero-slider">
        <div class="hero-slides-wrapper">
          <!-- Slides will be dynamically added here -->
        </div>
      </div>
      <div class="hero-controls">
        <button class="hero-btn hero-prev" aria-label="Previous">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <button class="hero-btn hero-next" aria-label="Next">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </div>
      <div class="hero-indicators"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Ongoing Anime</h2>
        <a href="/ongoing-anime" class="view-all">View All →</a>
      </div>
      <div class="anime-grid" id="latest-grid"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Completed Anime</h2>
        <a href="/complete-anime" class="view-all">View All →</a>
      </div>
      <div class="anime-grid" id="ongoing-grid"></div>
    </section>
  </div>

  <script src="/sw-register.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    // Check if this is a search request
    const urlParams = new URLSearchParams(window.location.search);
    const searchQuery = urlParams.get('s');
    const postType = urlParams.get('post_type');

    // If search query exists, redirect to search page
    if (searchQuery && postType === 'anime') {
      window.location.replace(`/search/?keyword=${encodeURIComponent(searchQuery)}`);
    }

    let currentSlide = 0;
    let slideInterval;
    let heroAnimes = [];

    function createHeroSlide(anime, index) {
      const slide = document.createElement('div');
      slide.className = 'hero-slide-modern';
      
      const slug = anime.animeId || anime.slug;
      const poster = anime.poster || 'https://via.placeholder.com/1200x600';
      const title = anime.title || 'Featured Anime';
      const episodes = anime.episodes || anime.episode || '';
      const status = anime.status || '';
      const score = anime.score || anime.releaseDay || '';
      
      slide.innerHTML = `
        <div class="hero-backdrop">
          <img src="${poster}" alt="${title}" loading="lazy">
          <div class="hero-gradient"></div>
        </div>
        <div class="hero-info">
          <div class="hero-badges">
            ${status ? `<span class="hero-badge ${status.toLowerCase().includes('ongoing') ? 'badge-ongoing' : 'badge-completed'}">${status}</span>` : ''}
            ${episodes ? `<span class="hero-badge badge-episode">${episodes}</span>` : ''}
            ${score ? `<span class="hero-badge badge-score">⭐ ${score}</span>` : ''}
          </div>
          <h1 class="hero-title-modern">${title}</h1>
          <div class="hero-actions">
            <a href="/detail/${slug}" class="hero-btn-primary">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
              </svg>
              Watch Now
            </a>
            <a href="/detail/${slug}" class="hero-btn-secondary">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
              </svg>
              More Info
            </a>
          </div>
        </div>
      `;
      
      return slide;
    }

    function updateSlide(index) {
      const wrapper = document.querySelector('.hero-slides-wrapper');
      const indicators = document.querySelectorAll('.hero-indicator');
      
      currentSlide = index;
      wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
      
      indicators.forEach((indicator, i) => {
        indicator.classList.toggle('active', i === currentSlide);
      });
    }

    function nextSlide() {
      const nextIndex = (currentSlide + 1) % heroAnimes.length;
      updateSlide(nextIndex);
    }

    function prevSlide() {
      const prevIndex = (currentSlide - 1 + heroAnimes.length) % heroAnimes.length;
      updateSlide(prevIndex);
    }

    function startAutoSlide() {
      stopAutoSlide();
      slideInterval = setInterval(nextSlide, 6000);
    }

    function stopAutoSlide() {
      if (slideInterval) {
        clearInterval(slideInterval);
      }
    }

    function initHeroCarousel(animes) {
      heroAnimes = animes.slice(0, 5);
      const wrapper = document.querySelector('.hero-slides-wrapper');
      const indicatorsContainer = document.querySelector('.hero-indicators');
      
      wrapper.innerHTML = '';
      indicatorsContainer.innerHTML = '';
      
      heroAnimes.forEach((anime, index) => {
        wrapper.appendChild(createHeroSlide(anime, index));
        
        const indicator = document.createElement('button');
        indicator.className = `hero-indicator ${index === 0 ? 'active' : ''}`;
        indicator.setAttribute('aria-label', `Slide ${index + 1}`);
        indicator.onclick = () => {
          updateSlide(index);
          startAutoSlide();
        };
        indicatorsContainer.appendChild(indicator);
      });
      
      const prevBtn = document.querySelector('.hero-prev');
      const nextBtn = document.querySelector('.hero-next');
      
      prevBtn.onclick = () => {
        prevSlide();
        startAutoSlide();
      };
      
      nextBtn.onclick = () => {
        nextSlide();
        startAutoSlide();
      };
      
      // Start auto slide
      startAutoSlide();
      
      // Pause on hover
      const hero = document.getElementById('hero');
      hero.addEventListener('mouseenter', stopAutoSlide);
      hero.addEventListener('mouseleave', startAutoSlide);
    }

    async function loadHome() {
      const latestGrid = document.getElementById('latest-grid');
      const ongoingGrid = document.getElementById('ongoing-grid');

      ui.showLoading(latestGrid);
      ui.showLoading(ongoingGrid);

      try {
        const response = await api.fetchHome();
        console.log('Home data received:', response);

        // Extract anime lists from the actual API structure
        let ongoingList = [];
        let completedList = [];

        if (response.data) {
          // Get ongoing anime list
          if (response.data.ongoing && response.data.ongoing.animeList) {
            ongoingList = response.data.ongoing.animeList;
          }
          // Get completed anime list
          if (response.data.completed && response.data.completed.animeList) {
            completedList = response.data.completed.animeList;
          }
        }

        console.log('Ongoing list:', ongoingList.length, 'items');
        console.log('Completed list:', completedList.length, 'items');

        // Initialize hero carousel with ongoing anime
        if (ongoingList.length > 0) {
          initHeroCarousel(ongoingList);
        }

        // Display ongoing anime (Latest Updates section)
        latestGrid.innerHTML = '';
        if (ongoingList.length > 0) {
          ongoingList.slice(0, 15).forEach(anime => {
            latestGrid.appendChild(ui.createAnimeCard(anime));
          });
        } else {
          ui.showError(latestGrid, 'No latest anime available.');
        }

        // Display completed anime (Ongoing section - we'll show completed here)
        ongoingGrid.innerHTML = '';
        if (completedList.length > 0) {
          completedList.slice(0, 14).forEach(anime => {
            ongoingGrid.appendChild(ui.createAnimeCard(anime));
          });
        } else if (ongoingList.length > 14) {
          // If no completed, show more ongoing
          ongoingList.slice(14, 28).forEach(anime => {
            ongoingGrid.appendChild(ui.createAnimeCard(anime));
          });
        } else {
          ui.showError(ongoingGrid, 'No anime available.');
        }

      } catch (error) {
        console.error('Error loading home:', error);
        ui.showError(latestGrid, 'Failed to load anime. Please try again later.');
        ui.showError(ongoingGrid, 'Failed to load anime. Please try again later.');
      }
    }

    loadHome();
  </script>
</body>

</html>
