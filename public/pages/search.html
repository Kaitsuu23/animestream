<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search anime - Find your favorite anime series">
  <meta name="theme-color" content="#6366f1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AnimeStream">
  
  <title>Search Anime - AnimeStream</title>
  
  <link rel="stylesheet" href="/style/style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">AnimeStream</a>
      <button class="mobile-menu-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/anime-list/">Anime</a></li>
        <li><a href="/genre-list/">Genres</a></li>
        <li><a href="/ongoing-anime/">Ongoing</a></li>
        <li><a href="/schedule/">Schedule</a></li>
      </ul>
      <div class="search-container">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search anime...">
        <div class="search-results"></div>
      </div>
    </div>
  </nav>

  <div class="container">
    <section class="section">
      <div class="section-header">
        <h1 class="section-title" id="searchTitle">Search Results</h1>
      </div>
      <div class="anime-grid" id="searchGrid">
        <!-- Search results will be loaded here -->
      </div>
    </section>

    <!-- No results message -->
    <div id="noResults" style="display: none; text-align: center; padding: 4rem 2rem;">
      <div style="font-size: 4rem; margin-bottom: 1.5rem; animation: fadeIn 0.5s;">😔</div>
      <h2 style="font-size: 1.75rem; margin-bottom: 1rem; color: var(--text-primary); font-weight: 700;">Anime Not Found</h2>
      <p style="color: var(--text-secondary); margin-bottom: 0.5rem; font-size: 1.1rem;">
        We couldn't find any anime matching <strong id="searchKeyword" style="color: var(--accent); font-weight: 600;"></strong>
      </p>
      <p style="color: var(--text-tertiary); margin-bottom: 2.5rem; font-size: 0.95rem;">
        Try searching with different keywords or check the spelling
      </p>
      <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
        <a href="/" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem; vertical-align: middle;">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          Back to Home
        </a>
        <button onclick="document.getElementById('searchInput').focus(); document.getElementById('searchInput').select();" class="btn btn-secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem; vertical-align: middle;">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          Try Another Search
        </button>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    // Wrap in IIFE to avoid variable conflicts with ui.js
    (function() {
      // Get search query from URL
      const urlParams = new URLSearchParams(window.location.search);
      const query = urlParams.get('keyword') || urlParams.get('s'); // Support both formats
      const searchGrid = document.getElementById('searchGrid');
      const searchTitle = document.getElementById('searchTitle');
      const noResults = document.getElementById('noResults');
      const searchInput = document.getElementById('searchInput');

      // Set search input value
      if (query) {
        searchInput.value = decodeURIComponent(query.replace(/\+/g, ' '));
      }

    async function performSearch(keyword) {
      if (!keyword || keyword.trim().length < 2) {
        searchGrid.innerHTML = '';
        noResults.style.display = 'block';
        searchTitle.textContent = 'Search Anime';
        return;
      }

      // Decode + to space for display
      const displayKeyword = keyword.replace(/\+/g, ' ');
      searchTitle.textContent = `Search results for "${displayKeyword}"`;
      noResults.style.display = 'none';
      ui.showLoading(searchGrid, 12);

      try {
        // Use decoded keyword for API call
        console.log('Searching for:', displayKeyword);
        const data = await api.search(displayKeyword);
        console.log('Search API response:', data);

        // Try different possible data structures
        let results = [];
        if (data.data && data.data.animeList) {
          results = data.data.animeList;
        } else if (data.data) {
          results = data.data.results || data.data.anime || data.data;
        } else if (data.results) {
          results = data.results;
        } else if (data.anime) {
          results = data.anime;
        } else if (data.animeList) {
          results = data.animeList;
        } else if (Array.isArray(data)) {
          results = data;
        }

        console.log('Parsed results:', results);

        if (!Array.isArray(results)) {
          console.warn('Results is not an array:', results);
          results = [];
        }

        searchGrid.innerHTML = '';

        if (results.length > 0) {
          results.forEach(anime => {
            searchGrid.appendChild(ui.createAnimeCard(anime, { hideStatus: true }));
          });
        } else {
          // Show no results with the searched keyword
          document.getElementById('searchKeyword').textContent = `"${displayKeyword}"`;
          noResults.style.display = 'block';
        }
      } catch (error) {
        console.error('Search error:', error);
        console.error('Error details:', error.response || error.message);
        ui.showError(searchGrid, 'Failed to load search results. Please try again.');
      }
    }

    // Perform search on page load
    if (query) {
      performSearch(query);
    } else {
      noResults.style.display = 'block';
      searchTitle.textContent = 'Search Anime';
    }

    // Handle search input - Enter key only
    let searchTimeout;
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const keyword = searchInput.value.trim();
        if (keyword) {
          window.location.href = `/search/?keyword=${encodeURIComponent(keyword)}`;
        }
      }
    });

    // Optional: Uncomment below for live search while typing
    /*
    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      const keyword = e.target.value.trim();
      
      if (keyword.length >= 2) {
        searchTimeout = setTimeout(() => {
          // Replace spaces with + for URL
          const encodedKeyword = keyword.replace(/\s+/g, '+');
          // Update URL without reload
          const newUrl = `/search/?s=${encodedKeyword}&post_type=anime`;
          window.history.pushState({}, '', newUrl);
          performSearch(encodedKeyword);
        }, 500);
      }
    });
    */
    })(); // End IIFE
  </script>
  <script src="/sw-register.js"></script>
</body>

</html>
