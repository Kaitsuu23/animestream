<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genres - AnimeStream</title>
  <link rel="stylesheet" href="/style/style.css">
  <style>
    /* ── Genre Browse Grid ── */
    .genres-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.6rem;
    }

    .genre-card {
      padding: 1rem 0.75rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-decoration: none;
      color: var(--text-primary);
      position: relative;
      overflow: hidden;
    }

    .genre-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .genre-card:hover::before {
      opacity: 1;
    }

    .genre-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.2);
    }

    .genre-card h3 {
      font-size: 0.85rem;
      font-weight: 600;
      margin: 0;
      line-height: 1.3;
      color: var(--text-primary);
    }

    .genre-card p {
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-top: 0.2rem;
    }

    /* ── Genre Anime List ── */
    .genre-anime-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 1rem;
    }

    .anime-detail-card {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      padding: 1rem;
      text-decoration: none;
    }

    .anime-detail-card:hover {
      background: rgba(99, 102, 241, 0.08);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(99, 102, 241, 0.15);
    }

    /* Title on top, full width */
    .anime-detail-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      margin: 0;
      line-height: 1.3;
      min-height: 2.6rem;
      text-align: center;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Meta row (studio / eps) */
    .anime-detail-meta {
      display: flex;
      gap: 0.8rem;
      font-size: 0.78rem;
      color: var(--text-secondary);
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--glass-border);
      flex-wrap: wrap;
      align-items: center;
    }

    .anime-detail-meta-item {
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .anime-detail-rating {
      margin-left: auto;
      font-weight: 600;
      color: #fbbf24;
    }

    /* Genre tags */
    .anime-detail-genres {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .anime-genre-tag {
      padding: 0.15rem 0.5rem;
      background: rgba(99, 102, 241, 0.12);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 4px;
      font-size: 0.65rem;
      color: var(--accent);
      font-weight: 500;
      white-space: nowrap;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .anime-genre-tag:hover {
      background: rgba(99, 102, 241, 0.3);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    /* Poster + description side by side */
    .anime-detail-body {
      display: flex;
      gap: 0.85rem;
      flex: 1;
    }

    .anime-detail-poster {
      width: 100px;
      height: 145px;
      overflow: hidden;
      flex-shrink: 0;
      border-radius: 8px;
    }

    .anime-detail-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .anime-detail-description {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.6;
      max-height: 145px;
      overflow-y: auto;
      flex: 1;
      padding-right: 2px;
      scrollbar-width: thin;
      scrollbar-color: rgba(99, 102, 241, 0.3) transparent;
    }

    .anime-detail-description::-webkit-scrollbar {
      width: 3px;
    }

    .anime-detail-description::-webkit-scrollbar-track {
      background: transparent;
    }

    .anime-detail-description::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.4);
      border-radius: 3px;
    }

    .anime-detail-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 0.4rem;
      border-top: 1px solid var(--glass-border);
    }

    .anime-detail-status {
      font-size: 0.72rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .anime-detail-watch {
      padding: 0.35rem 1rem;
      background: var(--accent);
      color: white;
      border-radius: 5px;
      font-size: 0.72rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .anime-detail-watch:hover {
      background: var(--accent-hover, #4f46e5);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }

    @media (max-width: 768px) {
      .genres-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 0.4rem;
      }

      .genre-card {
        padding: 0.75rem 0.5rem;
      }

      .genre-card h3 {
        font-size: 0.78rem;
      }

      .genre-anime-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">AnimeStream</a>
      <button class="mobile-menu-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/anime-list/">Anime</a></li>
        <li><a href="/genre-list/">Genres</a></li>
        <li><a href="/ongoing-anime/">Ongoing</a></li>
        <li><a href="/schedule/">Schedule</a></li>
      </ul>
      <div class="search-container">
        <input type="text" class="search-input" placeholder="Search anime...">
        <div class="search-results"></div>
      </div>
    </div>
  </nav>

  <div class="container">
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Browse by Genre</h2>
      </div>
      <div class="genres-grid" id="genres-grid"></div>
    </section>

    <section class="section" id="genre-anime-section" style="display: none;">
      <div class="section-header">
        <h2 class="section-title" id="genre-title">Genre Anime</h2>
      </div>
      <div class="genre-anime-list" id="genre-anime-grid"></div>
      <div class="pagination" id="pagination"></div>
    </section>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    function createAnimeDetailCard(anime) {
      const card = document.createElement('div');
      card.className = 'anime-detail-card fade-in';

      // Extract slug
      let slug = anime.animeId || anime.slug || '';
      if (!slug && anime.endpoint) {
        slug = anime.endpoint.replace('/anime/', '').replace('/', '');
      }
      if (!slug && anime.href) {
        const parts = anime.href.split('/').filter(s => s);
        slug = parts[parts.length - 1];
      }
      if (!slug && anime.link) {
        slug = anime.link.split('/').filter(s => s).pop();
      }

      card.onclick = () => {
        if (slug) {
          window.location.href = `/detail/${slug}`;
        }
      };

      const title = anime.title || anime.name || 'Unknown';
      const image = anime.poster || anime.thumb || anime.image || 'https://via.placeholder.com/120x170';

      // Studio name - field is "studios" not "studio"
      const studio = anime.studios || anime.studio || anime.producer || 'Unknown Studio';

      // Episode count - ensure it has "Eps" suffix
      let episodes = '';
      if (anime.episodes) {
        const ep = anime.episodes.toString();
        episodes = ep.toLowerCase().includes('eps') || ep.toLowerCase().includes('episode')
          ? anime.episodes
          : `${anime.episodes} Eps`;
      } else if (anime.episode) {
        const ep = anime.episode.toString();
        episodes = ep.toLowerCase().includes('eps') || ep.toLowerCase().includes('episode')
          ? anime.episode
          : `${anime.episode} Eps`;
      } else if (anime.totalEpisodes) {
        episodes = `${anime.totalEpisodes} Eps`;
      } else {
        episodes = 'Unknown Eps';
      }

      const rating = anime.score || anime.rating || '7.01';
      const status = anime.status || anime.type || '';
      const releaseDate = anime.season || anime.releaseDate || anime.year || 'Winter 2026';

      // Extract genres - field is "genreList" not "genres"
      let genres = [];
      if (anime.genreList && Array.isArray(anime.genreList)) {
        genres = anime.genreList.slice(0, 5);
      } else if (anime.genres && Array.isArray(anime.genres)) {
        genres = anime.genres.slice(0, 5);
      } else if (anime.genre && Array.isArray(anime.genre)) {
        genres = anime.genre.slice(0, 5);
      } else if (anime.genres && typeof anime.genres === 'string') {
        genres = anime.genres.split(',').map(g => g.trim()).slice(0, 5);
      }

      // Get description - from synopsis.paragraphs array
      let description = '';
      if (anime.synopsis && anime.synopsis.paragraphs && Array.isArray(anime.synopsis.paragraphs)) {
        description = anime.synopsis.paragraphs.filter(p => p.trim()).join(' ').trim();
      } else {
        description = anime.synopsis || anime.description || anime.summary || 'Mengisahkan Lizel, pemuda yang kini menjadi pedang menteri dari dunia fantasi. Suatu hari, Lizel yang tengah berbincang dengan keluarganya secara tiba-tiba pindah ke dunia lain.';
      }

      const genresHTML = genres.length > 0
        ? genres.map(g => {
          const name = typeof g === 'string' ? g : (g.title || g.name || '');
          const genreSlug = g.genreId || g.slug || name.toLowerCase().replace(/\s+/g, '-');
          return `<a class="anime-genre-tag" href="/genres/${genreSlug}/" onclick="event.stopPropagation()">${name}</a>`;
        }).join('')
        : '<span class="anime-genre-tag">Unknown</span>';

      card.innerHTML = `
        <h3 class="anime-detail-title">${title}</h3>
        <div class="anime-detail-meta">
          <span class="anime-detail-meta-item">${studio}</span>
          <span class="anime-detail-meta-item">${episodes}</span>
          <span class="anime-detail-rating">⭐ ${rating}</span>
        </div>
        <div class="anime-detail-genres">
          ${genresHTML}
        </div>
        <div class="anime-detail-body">
          <div class="anime-detail-poster">
            <img src="${image}" alt="${title}" loading="lazy" onerror="this.src='https://via.placeholder.com/100x145'">
          </div>
          <p class="anime-detail-description">${description}</p>
        </div>
        <div class="anime-detail-footer">
          <span class="anime-detail-status">${releaseDate}</span>
          ${slug ? `<a class="anime-detail-watch" href="/detail/${slug}" onclick="event.stopPropagation()">Download</a>` : ''}
        </div>
      `;

      return card;
    }

    async function loadGenres() {
      const genresGrid = document.getElementById('genres-grid');
      ui.showLoading(genresGrid, 12);

      try {
        const data = await api.fetchGenres();
        genresGrid.innerHTML = '';

        let genres = [];
        if (data.data && Array.isArray(data.data.genreList)) {
          genres = data.data.genreList;
        } else if (Array.isArray(data.genreList)) {
          genres = data.genreList;
        } else if (Array.isArray(data.data)) {
          genres = data.data;
        } else if (Array.isArray(data.genres)) {
          genres = data.genres;
        } else {
          genres = data.results || [];
        }

        genres.forEach(genre => {
          const genreCard = document.createElement('a');
          genreCard.className = 'genre-card fade-in';
          const slug = genre.genreId || genre.slug || genre.endpoint?.split('/').pop();
          genreCard.href = `/genres/${slug}/`;
          genreCard.innerHTML = `
            <h3>${genre.title || genre.name || 'Genre'}</h3>
            ${genre.count ? `<p>${genre.count} anime</p>` : ''}
          `;
          genresGrid.appendChild(genreCard);
        });

      } catch (error) {
        console.error('Error loading genres:', error);
        ui.showError(genresGrid, 'Failed to load genres.');
      }
    }

    function updateUrl(slug, page) {
      if (page === 1) {
        window.history.pushState({}, '', `/genres/${slug}/`);
      } else {
        window.history.pushState({}, '', `/genres/${slug}/page/${page}/`);
      }
    }

    async function loadGenreAnime(slug, page = 1) {
      const section = document.getElementById('genre-anime-section');
      const title = document.getElementById('genre-title');
      const grid = document.getElementById('genre-anime-grid');
      const pagination = document.getElementById('pagination');

      section.style.display = 'block';
      title.textContent = `Daftar Genre ${slug.charAt(0).toUpperCase() + slug.slice(1)}`;

      // Show loading skeletons for detail cards
      grid.innerHTML = '';
      for (let i = 0; i < 10; i++) {
        const skeleton = document.createElement('div');
        skeleton.className = 'anime-detail-card skeleton';
        skeleton.style.height = '200px';
        grid.appendChild(skeleton);
      }

      updateUrl(slug, page);

      try {
        const data = await api.fetchGenreAnime(slug, page);
        grid.innerHTML = '';

        let animeList = [];
        if (data.data && Array.isArray(data.data.animeList)) {
          animeList = data.data.animeList;
        } else if (Array.isArray(data.animeList)) {
          animeList = data.animeList;
        } else if (Array.isArray(data.data)) {
          animeList = data.data;
        } else {
          animeList = data.results || data.anime || [];
        }

        if (animeList.length === 0) {
          ui.showError(grid, 'No anime found for this genre.');
          pagination.innerHTML = '';
          return;
        }

        animeList.forEach(anime => {
          grid.appendChild(createAnimeDetailCard(anime));
        });

        // Scroll to top
        window.scrollTo({ top: 0, behavior: 'smooth' });

        // Handle pagination
        const paginationData = data.pagination || data.data?.pagination;
        if (paginationData) {
          pagination.innerHTML = '';

          const currentPage = paginationData.currentPage || 1;
          const totalPages = paginationData.totalPages || 1;

          if (totalPages > 1) {
            const paginationDiv = document.createElement('div');
            paginationDiv.className = 'pagination-controls';

            // Previous button
            if (currentPage > 1) {
              const prevBtn = document.createElement('button');
              prevBtn.innerHTML = '← Previous';
              prevBtn.className = 'pagination-btn';
              prevBtn.onclick = () => loadGenreAnime(slug, currentPage - 1);
              paginationDiv.appendChild(prevBtn);
            }

            // Page numbers
            const pageNumbers = document.createElement('div');
            pageNumbers.className = 'page-numbers';

            // Show first page
            if (currentPage > 3) {
              const firstBtn = createPageButton(1, currentPage, slug);
              pageNumbers.appendChild(firstBtn);

              if (currentPage > 4) {
                const dots = document.createElement('span');
                dots.className = 'page-dots';
                dots.textContent = '...';
                pageNumbers.appendChild(dots);
              }
            }

            // Show pages around current
            for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
              const pageBtn = createPageButton(i, currentPage, slug);
              pageNumbers.appendChild(pageBtn);
            }

            // Show last page
            if (currentPage < totalPages - 2) {
              if (currentPage < totalPages - 3) {
                const dots = document.createElement('span');
                dots.className = 'page-dots';
                dots.textContent = '...';
                pageNumbers.appendChild(dots);
              }

              const lastBtn = createPageButton(totalPages, currentPage, slug);
              pageNumbers.appendChild(lastBtn);
            }

            paginationDiv.appendChild(pageNumbers);

            // Next button
            if (currentPage < totalPages) {
              const nextBtn = document.createElement('button');
              nextBtn.innerHTML = 'Next →';
              nextBtn.className = 'pagination-btn';
              nextBtn.onclick = () => loadGenreAnime(slug, currentPage + 1);
              paginationDiv.appendChild(nextBtn);
            }

            pagination.appendChild(paginationDiv);
          }
        }

      } catch (error) {
        console.error('Error loading genre anime:', error);
        ui.showError(grid, 'Failed to load anime for this genre.');
      }
    }

    function createPageButton(pageNum, currentPage, slug) {
      const btn = document.createElement('button');
      btn.textContent = pageNum;
      btn.className = 'page-btn' + (pageNum === currentPage ? ' active' : '');
      if (pageNum !== currentPage) {
        btn.onclick = () => loadGenreAnime(slug, pageNum);
      }
      return btn;
    }

    // Check if genre parameter exists in URL path or search query
    const pathnameMatch = window.location.pathname.match(/\/genres\/([^\/]+)(?:\/page\/(\d+))?\/?/);
    const urlParams = new URLSearchParams(window.location.search);
    const genreSlug = pathnameMatch ? pathnameMatch[1] : urlParams.get('genre');
    const initialPage = pathnameMatch && pathnameMatch[2] ? parseInt(pathnameMatch[2]) : (parseInt(urlParams.get('page')) || 1);

    if (genreSlug) {
      document.getElementById('genres-grid').parentElement.style.display = 'none';
      loadGenreAnime(genreSlug, initialPage);
    } else {
      loadGenres();
    }
  </script>
</body>

</html>
